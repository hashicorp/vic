name: Build and Run Tests

on:
  pull_request:
  push:
    branches: [master]

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version:
          - "oldstable"
          - "stable"

    steps:
      - name: Set up Go
        uses: actions/setup-go@4dc6199c7b1a012772edbd06daecab0f50c9053c # v6.1.0
        with:
          go-version: ${{ matrix.go-version }}

      - name: Check out code into the Go module directory
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          path: src/github.com/vmware/vic/

      - name: Build
        run: |
          export GOPATH=$(realpath .)
          cd src/github.com/vmware/vic

          # NOTE: swagger code generation (the apiservers and imagec targets)
          # is intentionally excluded. The vendored go-swagger (2017-era) is
          # incompatible with modern Go toolchains, so the API server/client
          # code cannot be regenerated in CI. Build only the targets that do
          # not depend on swagger generation.
          make check vicadmin rpctool vic-machine tethers
